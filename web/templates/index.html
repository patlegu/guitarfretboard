<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Fretboard Interactive</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <header>
                <h1>🎸 Guitar Fretboard</h1>
            </header>
            
            <div class="control-section">
                <h3>Mode</h3>
                <div class="radio-group">
                    <label><input type="radio" name="mode" value="Scale" checked> Scale</label>
                    <label><input type="radio" name="mode" value="Arpeggio"> Arp</label>
                    <label><input type="radio" name="mode" value="Chord"> Chord</label>
                </div>
            </div>

            <div class="control-section">
                <h3>Instrument</h3>
                <select id="instrument-select">
                    <option value="Guitar">Guitar</option>
                    <option value="Bass">Bass</option>
                    <option value="Ukulele">Ukulele</option>
                </select>
                <select id="tuning-select"></select>
            </div>

            <div id="pattern-controls" class="control-section hidden">
                <h3>Pattern</h3>
                <select id="root-select">
                    <option value="C">C</option><option value="C#">C#</option>
                    <option value="D">D</option><option value="Eb">Eb</option>
                    <option value="E">E</option><option value="F">F</option>
                    <option value="F#">F#</option><option value="G">G</option>
                    <option value="G#">G#</option><option value="A">A</option>
                    <option value="Bb">Bb</option><option value="B">B</option>
                </select>
                <select id="pattern-select"></select>
                
                <h3 style="margin-top: 10px;">CAGED Filter</h3>
                <select id="caged-select">
                    <option value="None">None</option>
                    <option value="C">C</option><option value="A">A</option>
                    <option value="G">G</option><option value="E">E</option>
                    <option value="D">D</option>
                </select>
            </div>

            <div class="control-section">
                <h3>Settings</h3>
                <label>Frets: <input type="number" id="frets-input" value="12" min="5" max="24"></label>
                <select id="theme-select"></select>
                <label style="display: flex; align-items: center; gap: 8px; margin-top: 10px;">
                    <input type="checkbox" id="note-colors-toggle" checked> Note Colors (A-G)
                </label>
            </div>

            <div class="sidebar-footer">
                <button id="clear-btn">Clear All Notes</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="result-panel">
                <h2 id="scale-header">Scale: <span id="pattern-display">C Major</span></h2>
                <h2 id="chord-header" class="hidden">Chord Identification</h2>
                <div id="chord-detection-wrapper">
                    <strong>Detected Chord:</strong> <span id="chord-name">None</span>
                </div>
                <p class="help-text">Click on the fretboard to add/remove notes manually.</p>
            </div>

            <div class="fretboard-card">
                <div class="fretboard-container" id="fretboard-wrapper">
                    <div class="loader">Loading Fretboard...</div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
