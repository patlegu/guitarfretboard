<svg xmlns="http://www.w3.org/2000/svg" width="350" height="250" viewBox="0 0 350 250">
  <style>
    .fret { stroke: #000; stroke-width: 2px; }
    .string { stroke: #000; }
    .nut { stroke: #000; stroke-width: 5px; }
    .fret-text { font-family: sans-serif; font-size: 14px; text-anchor: middle; font-weight: bold; }
    .tuning-text { font-family: sans-serif; font-weight: bold; font-size: 16px; text-anchor: middle; alignment-baseline: middle; }
    .note-circle { stroke: #000; stroke-width: 1px; }
    .note-text { font-family: sans-serif; font-weight: bold; font-size: 14px; text-anchor: middle; alignment-baseline: central; }
    .note-text-small { font-family: sans-serif; font-weight: bold; font-size: 10px; text-anchor: middle; alignment-baseline: central; }
    .title-text { font-family: sans-serif; font-size: 24px; text-anchor: middle; font-weight: bold; }
    .legend-text { font-family: sans-serif; font-size: 14px; text-anchor: start; }
    .split-line { stroke: #000; stroke-width: 1px; }
  </style>
  <rect width="100%" height="100%" fill="white"/>
  <text x="175.0" y="30" class="title-text">A minor (Left-Handed)</text>
  <line x1="310" y1="60" x2="310" y2="210" class="nut"/>
  <line x1="260" y1="60" x2="260" y2="210" class="fret"/>
  <text x="285.0" y="230" class="fret-text">1</text>
  <line x1="210" y1="60" x2="210" y2="210" class="fret"/>
  <text x="235.0" y="230" class="fret-text">2</text>
  <line x1="160" y1="60" x2="160" y2="210" class="fret"/>
  <text x="185.0" y="230" class="fret-text">3</text>
  <line x1="110" y1="60" x2="110" y2="210" class="fret"/>
  <text x="135.0" y="230" class="fret-text">4</text>
  <line x1="60" y1="60" x2="60" y2="210" class="fret"/>
  <text x="85.0" y="230" class="fret-text">5</text>
  <line x1="310" y1="60" x2="60" y2="60" class="string" style="stroke-width: 1.0px;"/>
  <text x="285" y="60" class="tuning-text">E</text>
  <line x1="310" y1="90" x2="60" y2="90" class="string" style="stroke-width: 1.5px;"/>
  <text x="285" y="90" class="tuning-text">B</text>
  <line x1="310" y1="120" x2="60" y2="120" class="string" style="stroke-width: 2.0px;"/>
  <text x="285" y="120" class="tuning-text">G</text>
  <line x1="310" y1="150" x2="60" y2="150" class="string" style="stroke-width: 2.5px;"/>
  <text x="285" y="150" class="tuning-text">D</text>
  <line x1="310" y1="180" x2="60" y2="180" class="string" style="stroke-width: 3.0px;"/>
  <text x="285" y="180" class="tuning-text">A</text>
  <line x1="310" y1="210" x2="60" y2="210" class="string" style="stroke-width: 3.5px;"/>
  <text x="285" y="210" class="tuning-text">E</text>
</svg>